name: Monitor de vídeos Shopee

on:
  schedule:
    - cron: "0 12 * * *" # 09:00 (America/Sao_Paulo)
    - cron: "0 0 * * *" # 21:00 (America/Sao_Paulo)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-grupo
  cancel-in-progress: false

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_API_SECRET: ${{ secrets.SHOPEE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_MONITOR_CHAT_IDS: ${{ secrets.TELEGRAM_MONITOR_CHAT_IDS }}
        run: python monitor_grupo.py --limite 15

      - name: Salvar progresso
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if [ -f divulgacao_ids.json ]; then git add divulgacao_ids.json; fi
          git diff --cached --quiet || git commit -m "chore: atualiza progresso do monitor"
          git push
